name: Tests

on:
  push:
    branches:
      - main 
      - development
      - '[0-9]+.x'
  pull_request:
    branches: 
      - main
      - development
      - '[0-9]+.x'
jobs:
  test:
    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.1"
            laravel: "10.*"
            testbench: "8.*"
            phpunit: "^10.5"
          - php: "8.2"
            laravel: "10.*"
            testbench: "8.*"
            phpunit: "^10.5"
          - php: "8.2"
            laravel: "11.*"
            testbench: "9.*"
            phpunit: "^10.0"
          - php: "8.3"
            laravel: "11.*"
            testbench: "9.*"
            phpunit: "^10.0"
          - php: "8.2"
            laravel: "12.*"
            testbench: "10.*"
            phpunit: "^11.0"
          - php: "8.3"
            laravel: "12.*"
            testbench: "10.*"
            phpunit: "^11.0"
          - php: "8.4"
            laravel: "12.*"
            testbench: "10.*"
            phpunit: "^11.0"
          - php: "8.3"
            laravel: "13.*"
            testbench: "11.*"
            phpunit: "^11.0"
          - php: "8.4"
            laravel: "13.*"
            testbench: "11.*"
            phpunit: "^11.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "phpunit/phpunit:${{ matrix.phpunit }}" \
            --dev --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit --testdox

  all-tests-passed:
    name: Tests
    needs: [test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more tests failed"
            exit 1
          fi
          echo "All tests passed"
